<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diagnostic colorimétrique</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:30px;
}

h2{text-align:center}

select,input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc
}

.progress{
text-align:center;
margin-top:20px;
font-weight:bold
}

.testRow{
display:flex;
justify-content:center;
gap:30px;
margin:30px 0;
flex-wrap:wrap
}

.choice{
width:180px;
height:180px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer
}

.choice img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover
}

.gold{background:linear-gradient(135deg,#fff3a3,#ffd700,#e0b000)}
.silver{background:linear-gradient(135deg,#ffffff,#cfcfcf,#9f9f9f)}
.white{background:#ffffff}
.cream{background:#fff2d6}

.palette{
display:grid;
grid-template-columns:repeat(3,110px);
gap:20px;
justify-content:center;
margin-top:25px
}

.swatch{
width:70px;
height:70px;
border-radius:6px;
margin:auto
}

.colorBox{
text-align:center;
font-size:12px
}

.seasonButtons{
margin-top:30px;
text-align:center
}

.seasonButtons button{
margin:4px;
padding:6px 10px;
border-radius:20px;
border:none;
background:#eee;
cursor:pointer
}

.resetButton{
margin-top:30px;
text-align:center
}

.resetButton button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#890060;
color:white;
cursor:pointer
}

.hidden{display:none}

</style>

</head>

<body>
<div style="text-align:center;margin-bottom:25px;">
<img src="logo-mlm.svg" alt="Logo MLM" style="max-width:120px;height:auto;">
</div>
<h2>Diagnostic colorimétrique</h2>

<label>Couleur des cheveux</label>
<select id="hair">
<option value="">-- choisir --</option>
<option value="light">Clairs</option>
<option value="medium">Châtains</option>
<option value="dark">Foncés</option>
<option value="red">Roux</option>
</select>

<label>Couleur des yeux</label>
<select id="eyes">
<option value="">-- choisir --</option>
<option value="light">Clairs</option>
<option value="soft">Noisette / Vert</option>
<option value="dark">Foncés</option>
</select>

<label>Carnation</label>
<select id="skin">
<option value="">-- choisir --</option>
<option value="light">Claire</option>
<option value="medium">Moyenne</option>
<option value="deep">Profonde</option>
</select>

<label>Importer votre photo</label>
<input type="file" id="photo">

<hr>

<div id="tests" class="hidden">

<div class="progress" id="progress"></div>

<h3 style="text-align:center">
Quelle couleur illumine le plus votre visage ?
</h3>

<div id="testContainer"></div>

</div>

<div id="result" class="hidden">

<h2 id="season"></h2>

<div id="palette" class="palette"></div>

<div class="seasonButtons" id="seasonButtons"></div>

<div class="resetButton">
<button onclick="resetTest()">Recommencer le diagnostic</button>
</div>

</div>

<script>

let photoSrc=""
let index=0

let score={
warm:0,
cool:0,
light:0,
deep:0,
soft:0,
bright:0
}

const tests=[
["gold","silver"],
["cream","white"],
["#ff7f50","#ff00aa"],
["#556b2f","#1e90ff"],
["#c04000","#8a2be2"],
["#888888","#ff00ff"],
["#eeeeee","#111111"]
]

document.getElementById("photo").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(){
photoSrc=reader.result
document.getElementById("tests").classList.remove("hidden")
createTest()
}

reader.readAsDataURL(e.target.files[0])

})

function createTest(){

if(index>=tests.length){
calculateResult()
return
}

document.getElementById("progress").innerText="Question "+(index+1)+" / "+tests.length

let row=document.createElement("div")
row.className="testRow"

tests[index].forEach(color=>{

let box=document.createElement("div")
box.className="choice"

if(color=="gold") box.classList.add("gold")
else if(color=="silver") box.classList.add("silver")
else if(color=="white") box.classList.add("white")
else if(color=="cream") box.classList.add("cream")
else box.style.background=color

let img=document.createElement("img")
img.src=photoSrc

box.appendChild(img)

box.onclick=function(){

scoreColor(color)
index++
createTest()

}

row.appendChild(box)

})

document.getElementById("testContainer").innerHTML=""
document.getElementById("testContainer").appendChild(row)

}

function scoreColor(color){

if(["gold","#ff7f50","#556b2f","#c04000"].includes(color)) score.warm++
if(["silver","#ff00aa","#1e90ff","#8a2be2"].includes(color)) score.cool++

if(["white","#eeeeee"].includes(color)) score.light++
if(["#111111","#c04000"].includes(color)) score.deep++

if(["#888888","#556b2f"].includes(color)) score.soft++
if(["#ff00ff","#ff7f50"].includes(color)) score.bright++

}

function drapingSeason(){

let temperature = score.warm - score.cool
let value = score.light - score.deep
let chroma = score.bright - score.soft

let seasonScore = {

"Printemps clair": temperature + value,
"Printemps chaud": temperature + chroma,
"Printemps lumineux": temperature + value + chroma,

"Été clair": -temperature + value - chroma,
"Été doux": -temperature - chroma,
"Été froid": -temperature + value,

"Automne doux": temperature - chroma,
"Automne chaud": temperature - value,
"Automne profond": temperature - value - chroma,

"Hiver lumineux": -temperature + chroma,
"Hiver froid": -temperature - value,
"Hiver profond": -temperature - value + chroma

}

let bestSeason=null
let bestScore=-Infinity

for(let s in seasonScore){

if(seasonScore[s] > bestScore){
bestScore=seasonScore[s]
bestSeason=s
}

}

return bestSeason

}

function calculateResult(){

let season=drapingSeason()

document.getElementById("season").innerText="Saison probable : "+season

showPalette(season)
createSeasonButtons()

document.getElementById("result").classList.remove("hidden")

}

function createSeasonButtons(){

let container=document.getElementById("seasonButtons")
container.innerHTML=""

Object.keys(palettes).forEach(s=>{

let b=document.createElement("button")
b.innerText=s

b.onclick=function(){
showPalette(s)
}

container.appendChild(b)

})

}

function showPalette(season){

let palette=palettes[season]
let pal=document.getElementById("palette")

pal.innerHTML=""

palette.forEach(c=>{

let box=document.createElement("div")
box.className="colorBox"

let sw=document.createElement("div")
sw.className="swatch"
sw.style.background=c[0]

let label=document.createElement("div")
label.innerText=c[1]

box.appendChild(sw)
box.appendChild(label)

pal.appendChild(box)

})

}

function resetTest(){

index=0

score={
warm:0,
cool:0,
light:0,
deep:0,
soft:0,
bright:0
}

document.getElementById("tests").classList.add("hidden")
document.getElementById("result").classList.add("hidden")
document.getElementById("photo").value=""

}

const palettes={
"Printemps clair":[["#4FA3F7","Bleu ciel"],["#FF6F61","Rouge corail"],["#FFD966","Jaune mimosa"],["#D291BC","Rose pastel"],["#FFA94D","Orange abricot"],["#7ED957","Vert tendre"],["#D4AF37","Or"],["#FFF8E7","Écru"],["#CFC8B8","Beige"]],
"Printemps chaud":[["#3A86FF","Bleu turquoise"],["#E63946","Rouge coquelicot"],["#FFC300","Jaune soleil"],["#C77DFF","Violet orchidée"],["#F77F00","Orange mangue"],["#70AD47","Vert prairie"],["#C9A227","Or chaud"],["#FFF2CC","Écru"],["#BFA58A","Camel"]],
"Printemps lumineux":[["#0077FF","Bleu électrique"],["#FF0033","Rouge vif"],["#FFFF33","Jaune citron"],["#FF00FF","Rose magenta"],["#FF6600","Orange vif"],["#00FF7F","Vert brillant"],["#FFD700","Or brillant"],["#FFFFFF","Blanc pur"],["#B0B0B0","Gris"]],
"Été clair":[["#8EC9FF","Bleu glacier"],["#FF8FA3","Rouge framboise"],["#FFF3A3","Jaune pastel"],["#D8B4FF","Lavande"],["#FFB4A2","Saumon"],["#B7E4C7","Vert menthe"],["#C0C0C0","Argent"],["#FFFFFF","Blanc doux"],["#C7C7C7","Gris perle"]],
"Été doux":[["#7A9CC6","Bleu brume"],["#C76D7E","Rouge fané"],["#E9D8A6","Jaune sable"],["#A88BC0","Violet grisé"],["#D4A373","Pêche doux"],["#8FBC8F","Vert sauge"],["#C0C0C0","Argent mat"],["#F5F5F5","Blanc cassé"],["#A8A8A8","Gris doux"]],
"Été froid":[["#5DA9E9","Bleu givré"],["#D72638","Rouge cerise"],["#F6E05E","Jaune froid"],["#9D79D6","Violet froid"],["#F08080","Corail froid"],["#66CDAA","Vert aqua"],["#C0C0C0","Argent"],["#F8F9FA","Blanc froid"],["#9AA0A6","Gris"]],
"Automne doux":[["#6B8BA4","Bleu ardoise"],["#A0522D","Rouge brique"],["#D4A017","Jaune moutarde"],["#7D5BA6","Violet prune"],["#C97A40","Orange brûlé"],["#6B8E23","Vert mousse"],["#C9A227","Or antique"],["#F5DEB3","Écru"],["#8B7355","Taupe"]],
"Automne chaud":[["#1F4E79","Bleu pétrole"],["#8B0000","Rouge terre cuite"],["#E0A800","Jaune curry"],["#6A0DAD","Violet aubergine"],["#D2691E","Orange brûlé"],["#556B2F","Vert olive"],["#B8860B","Or antique"],["#FAF0E6","Écru"],["#6B4F3A","Brun chaud"]],
"Automne profond":[["#0B3C49","Bleu canard"],["#7B1113","Rouge grenat"],["#C99700","Jaune safran"],["#4B0082","Violet profond"],["#B7410E","Orange rouille"],["#014421","Vert forêt"],["#996515","Or profond"],["#F3E5AB","Écru profond"],["#3E2723","Brun chocolat"]],
"Hiver lumineux":[["#0057FF","Bleu vif"],["#FF003C","Rouge vif"],["#FFFF00","Jaune primaire"],["#7F00FF","Violet électrique"],["#FF6A00","Orange vif"],["#00FF9F","Vert néon"],["#E5E4E2","Argent brillant"],["#FFFFFF","Blanc pur"],["#808080","Gris"]],
"Hiver froid":[["#0033A0","Bleu cobalt"],["#C00000","Rouge rubis"],["#F0E68C","Jaune froid"],["#6A5ACD","Violet indigo"],["#FF4500","Orange froid"],["#008080","Vert sarcelle"],["#C0C0C0","Argent"],["#FFFFFF","Blanc neige"],["#4A4A4A","Gris anthracite"]],
"Hiver profond":[["#00008B","Bleu nuit"],["#8B0000","Bordeaux"],["#FFD700","Jaune profond"],["#2E0854","Violet impérial"],["#C04000","Orange brûlé"],["#004B49","Vert sombre"],["#C0C0C0","Argent"],["#F8F9FA","Blanc froid"],["#1C1C1C","Noir"]]
}

</script>

</body>
</html>
